<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مواقيت الصلاة | FIT V</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700;900&display=swap');

        :root {
            --dark-brown:   #120e0b;
            --accent-beige: #d1bc9b;
            --text-cream:   #f4eee0;
            --glass-table:  rgba(28, 22, 18, 0.9);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-brown);
        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-brown);
            background-image:
                radial-gradient(circle at center, rgba(45,34,26,0.8) 0%, var(--dark-brown) 100%),
                repeating-linear-gradient(45deg,  rgba(209,188,155,0.1) 0px, rgba(209,188,155,0.1) 1px, transparent 1px, transparent 45px),
                repeating-linear-gradient(-45deg, rgba(209,188,155,0.1) 0px, rgba(209,188,155,0.1) 1px, transparent 1px, transparent 45px);
            color: var(--text-cream);
            isolation: isolate;
        }

        #appContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
            padding: 1vh 2.5vw 1vh;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .header {
            flex: 0 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3vh;
        }

        #fullDate {
            font-size: clamp(10px, 1.6vw + 0.5vh, 18px);
            font-weight: 900;
            color: var(--accent-beige);
            opacity: 0.8;
            white-space: nowrap;
        }

        #dayName {
            font-weight: 900;
            font-size: clamp(16px, 2.5vw + 1vh, 42px);
            line-height: 1;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .clock-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: clamp(4px, 1vw, 12px);
        }

        #mainClock {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(52px, 13vw + 2vh, 180px);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: -0.03em;
            color: var(--accent-beige);
            text-shadow: 0 0 40px rgba(209,188,155,0.3);
        }

        .clock-sub {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
        }

        #secondsClock {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(14px, 3vw + 0.5vh, 40px);
            font-weight: 700;
            color: #fff;
        }

        #ampm {
            font-size: clamp(10px, 1.8vw + 0.3vh, 24px);
            font-weight: 900;
            color: var(--accent-beige);
        }

        .countdown-wrapper {
            background: var(--accent-beige);
            color: var(--dark-brown);
            padding: clamp(3px,0.5vh,8px) clamp(10px,3vw,28px);
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #nextPrayerCountdown {
            font-size: clamp(10px, 1.5vw + 0.6vh, 22px);
            font-weight: 900;
            white-space: nowrap;
        }

        .dhikr-box {
            flex: 0 0 auto;
            height: clamp(36px, 6vh, 72px);
            padding: 0 clamp(8px, 2vw, 20px);
            background: rgba(209,188,155,0.08);
            backdrop-filter: blur(4px);
            border-radius: clamp(8px, 1.5vw, 18px);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: clamp(3px, 0.6vh, 10px) 0;
            border: 1px solid rgba(209,188,155,0.2);
            overflow: hidden;
        }

        #dhikrText {
            color: var(--text-cream);
            font-weight: 800;
            text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            line-height: 1.3;
            width: 100%;
            word-wrap: break-word;
        }

        .dhikr-fade { opacity: 0; transform: translateY(5px); }

        .content-area {
            flex: 1 1 0;
            min-height: 0;
            position: relative;
            overflow: hidden;
            border-radius: clamp(12px, 2vw, 28px);
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        .prayer-list-container {
            background: var(--glass-table);
            backdrop-filter: blur(20px);
            border-radius: clamp(12px, 2vw, 28px);
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            padding: clamp(2px, 0.3vh, 5px);
            border: 1px solid rgba(209,188,155,0.15);
            transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }

        #promoImage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: clamp(12px, 2vw, 28px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(105%);
            transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
            z-index: 10;
        }

        .prayer-row {
            flex: 1 1 0;
            min-height: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 clamp(6px, 2.5vw, 24px);
            border-bottom: 1px solid rgba(209,188,155,0.06);
            font-size: clamp(12px, 1.8vw + 1.2vh, 32px);
            font-weight: 900;
            color: var(--text-cream);
        }

        .prayer-row:last-child { border-bottom: none; }

        .col-name  { width: 33%; text-align: center; }
        .col-adhan { width: 33%; text-align: center; font-size: 1.15em; }
        .col-iqama { width: 33%; text-align: center; font-size: 1.15em; color: var(--accent-beige); }

        .next-active {
            background: linear-gradient(90deg, rgba(209,188,155,0.22), transparent, rgba(209,188,155,0.22)) !important;
            border-radius: clamp(6px, 1.2vw, 18px);
            border: 2px solid var(--accent-beige) !important;
            color: #fff !important;
        }

        #settingsIcon {
            position: absolute;
            top: clamp(8px, 1.5vh, 18px);
            right: clamp(8px, 2vw, 18px);
            font-size: clamp(14px, 2vw, 22px);
            opacity: 0.3;
            cursor: pointer;
            z-index: 50;
            color: var(--accent-beige);
        }

        #settingsOverlay {
            background: #000;
            z-index: 7000;
            padding: clamp(10px,2vh,20px) clamp(10px,3vw,24px);
            display: none;
            flex-direction: column;
            position: absolute;
            inset: 0;
            color: white;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .adj-card {
            background: rgba(255,255,255,0.05);
            padding: clamp(8px,1.2vh,14px);
            border-radius: clamp(8px,1.5vw,14px);
            border: 1px solid var(--accent-beige);
            margin-bottom: clamp(6px,1vh,12px);
        }

        #afterPrayerOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #afterPrayerOverlay.fade-in { opacity: 1; }
        #dhikrImageDisplay { width:100%; height:100%; object-fit:fill; display:none; }

        #dhikrDisplayArea {
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .card-dhikr {
            position: absolute;
            background: rgba(28,22,18,0.95);
            border: clamp(2px,0.4vw,4px) solid var(--accent-beige);
            border-radius: clamp(16px,3vw,40px);
            padding: clamp(16px,3vh,40px) clamp(12px,3vw,32px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: clamp(280px,90%,800px);
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.8s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
        }

        .card-dhikr .ct { font-size: clamp(15px, 3.5vw, 38px); font-weight: bold; color: var(--text-cream); }
        .card-dhikr .cr { font-size: clamp(11px, 2.2vw, 26px); font-weight: 900; color: var(--accent-beige); margin-top: clamp(8px,1.5vh,18px); }
        .card-dhikr.active { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }

        .overlay-window {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: 0.6s ease;
            z-index: 2000;
            background: var(--dark-brown);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .overlay-window.active { opacity:1; visibility:visible; }

        #alertTitle      { font-size: clamp(13px,2.5vw,28px); font-weight:bold; margin-bottom: clamp(8px,2vh,20px); opacity:0.5; }
        #alertPrayerName { font-size: clamp(32px,9vw,90px);   font-weight:900; color:var(--accent-beige); }
    </style>
</head>
<body>

<div id="appContainer">

    <div id="blackOverlay" class="overlay-window" style="background:#000;z-index:8000;"></div>
    <i id="settingsIcon" class="fas fa-sliders-h" onclick="toggleSettings()"></i>

    <div class="header">
        <p id="fullDate">
            <span id="hijriDate">--</span>
            <span style="margin:0 0.5em;opacity:0.4;">|</span>
            <span id="gregorianDate">جاري التحميل...</span>
        </p>
        <h1 id="dayName">--</h1>
        <div class="clock-row">
            <span id="mainClock">00:00</span>
            <div class="clock-sub">
                <span id="secondsClock">00</span>
                <span id="ampm">--</span>
            </div>
        </div>
        <div class="countdown-wrapper">
            <div id="nextPrayerCountdown">النظام مجاني (للاستخدام)</div>
        </div>
    </div>

    <div class="dhikr-box">
        <div id="dhikrText">أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ</div>
    </div>

    <div class="content-area">
        <div class="prayer-list-container" id="prayerList"></div>
        <img id="promoImage" src="https://lh3.googleusercontent.com/d/1LHrQSgZkf_xMpKoUydhw5Pqfyu9ZBXB1" alt="Promo">
    </div>

    <div id="settingsOverlay">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h2 style="font-size:clamp(15px,2.5vw,22px);font-weight:900;color:var(--accent-beige);">الإعدادات</h2>
            <div style="display:flex;gap:6px;">
                <button onclick="rotate(0)"   style="background:#fff;padding:4px 10px;border-radius:6px;font-size:clamp(10px,1.5vw,13px);font-weight:700;color:#000;cursor:pointer;">طبيعي</button>
                <button onclick="rotate(90)"  style="background:#fff;padding:4px 10px;border-radius:6px;font-size:clamp(10px,1.5vw,13px);font-weight:700;color:#000;cursor:pointer;">يمين</button>
                <button onclick="rotate(-90)" style="background:#fff;padding:4px 10px;border-radius:6px;font-size:clamp(10px,1.5vw,13px);font-weight:700;color:#000;cursor:pointer;">يسار</button>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;">
            <div class="adj-card">
                <p style="font-weight:900;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;margin-bottom:8px;color:var(--accent-beige);font-size:clamp(11px,1.8vw,14px);">طريقة ظهور الأذكار بعد الصلاة</p>
                <select id="dhikrModeSelect" onchange="saveDhikrMode()" style="width:100%;background:rgba(255,255,255,0.1);padding:6px;border-radius:6px;color:#fff;font-size:clamp(11px,1.8vw,14px);">
                    <option value="cards">بطاقات الأذكار المتتالية</option>
                    <option value="image">صورة ثابتة (5 دقائق)</option>
                </select>
            </div>
            <div class="adj-card">
                <p style="font-weight:900;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;margin-bottom:8px;color:var(--accent-beige);font-size:clamp(11px,1.8vw,14px);">الشاشة السوداء (دقائق)</p>
                <div id="blackScreenAdjList"></div>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:8px;">
            <div class="adj-card">
                <p style="font-weight:900;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;margin-bottom:8px;color:var(--accent-beige);font-size:clamp(11px,1.8vw,14px);">تعديل الأذان (دقائق)</p>
                <div id="adhanAdjList"></div>
            </div>
            <div class="adj-card">
                <p style="font-weight:900;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;margin-bottom:8px;color:var(--accent-beige);font-size:clamp(11px,1.8vw,14px);">تعديل الإقامة (دقائق)</p>
                <div id="iqamaAdjList"></div>
            </div>
        </div>
        <button onclick="toggleSettings()" style="width:100%;background:var(--accent-beige);color:#000;padding:clamp(8px,1.5vh,14px);border-radius:12px;font-weight:900;font-size:clamp(14px,2.5vw,20px);margin-top:14px;cursor:pointer;">حفظ وإغلاق</button>
    </div>

    <div id="afterPrayerOverlay">
        <img id="dhikrImageDisplay" src="https://lh3.googleusercontent.com/d/1ydFlemKPXrrBCW9nd_37sNpOU0OqllN-" alt="الأذكار">
        <div id="dhikrDisplayArea"></div>
    </div>

    <div id="alertOverlay" class="overlay-window">
        <p id="alertTitle">الآن يرفع أذان</p>
        <p id="alertPrayerName">--</p>
    </div>

</div>

<script>
    const S_URL       = "https://script.google.com/macros/s/AKfycbyrI707RYDyD2nv2TR9MVx41BVh8EIXwTVCwP86Xq66rHbYuAzSxfa0z_MIWzgR0e0fmw/exec?city=Madinah&year=2026";
    const DATA_K      = "P_MASTER_V30";
    const OFF_K       = "P_OFFSETS_V30";
    const DHIKR_MODE_K= "P_DHIKR_MODE";

    const arNames      = { Fajr:"الفجر", Sunrise:"الشروق", Dhuhr:"الظهر", Asr:"العصر", Maghrib:"المغرب", Isha:"العشاء" };
    const defaultIqama = { Fajr:25, Sunrise:20, Dhuhr:15, Asr:15, Maghrib:10, Isha:20 };
    const keys         = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];

    const dhikrList = [
        "{فَاذْكُرُونِي أَذْكُرْكُمْ}","{وَاسْتَغْفِرُوا اللَّهَ إِنَّ اللَّهَ غَفُورٌ رَّحِيمٌ}",
        "{أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ}","{إِنَّ اللَّهَ مَعَ الصَّابِرِينَ}",
        "{ادْعُونِي أَسْتَجِبْ لَكُمْ}","{وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ}",
        "{إِنَّ رَبِّي قَرِيبٌ مُّجِيبٌ}","{وَتَوَكَّلْ عَلَى الْحَيِّ الَّذِي لَا يَمُوتُ}",
        "{فَاِنَّ مَعَ الْعُسْرِ يُسْرًا}","{وَقُل رَّبِّ زِدْنِي عِلْمًا}",
        "{لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا}","{رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً}",
        "{وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ}","{إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ}",
        "{قُلْ هُوَ اللَّهُ أَحَدٌ}",
        "سبحان الله وبحمده، سبحان الله العظيم","لا إله إلا الله وحده لا شريك له",
        "الحمد لله حمداً كثيراً طيباً مباركاً فيه","الله أكبر كبيراً، والحمد لله كثيراً",
        "لا حول ولا قوة إلا بالله","استغفر الله واتوب إليه",
        "اللهم صلِّ وسلم على نبينا محمد","سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر",
        "يا حي يا قيوم برحمتك أستغيث","لا إله إلا أنت سبحانك إني كنت من الظالمين",
        "رضيت بالله رباً، وبالإسلام ديناً، وبمحمد نبيناً","حسبنا الله ونعم الوكيل",
        "اللهم إنك عفو كريم تحب العفو فاعفُ عني","اللهم اهدني وسددني",
        "بسم الله الذي لا يضر مع اسمه شيء",
        "اللهم إنك عفو تحب العفو فاعفُ عني",
        "ربي اغفر لي وتب عليّ إنك أنت التواب الرحيم"
    ];

    let prayerData  = JSON.parse(localStorage.getItem(DATA_K));
    let userOffsets = JSON.parse(localStorage.getItem(OFF_K)) || {
        adhan: { Fajr:0,  Sunrise:0, Dhuhr:0, Asr:0, Maghrib:0, Isha:0 },
        iqama: { Fajr:0,  Sunrise:0, Dhuhr:0, Asr:0, Maghrib:0, Isha:0 },
        black: { Fajr:13, Dhuhr:7,   Asr:7,   Maghrib:7, Isha:12 }
    };

    async function init() {
        renderAdjusters();
        const savedMode = localStorage.getItem(DHIKR_MODE_K);
        if (savedMode) document.getElementById('dhikrModeSelect').value = savedMode;
        try {
            const r = await fetch(S_URL);
            const d = await r.json();
            if (d && d["1"]) { localStorage.setItem(DATA_K, JSON.stringify(d)); prayerData = d; }
        } catch(e) {}
        if (prayerData) { setInterval(update, 1000); update(); }
    }

    function saveDhikrMode() {
        localStorage.setItem(DHIKR_MODE_K, document.getElementById('dhikrModeSelect').value);
    }

    function toggleSettings() {
        const s = document.getElementById('settingsOverlay');
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
    }

    function rotate(deg) {
        const c    = document.getElementById('appContainer');
        const body = document.body;
        const html = document.documentElement;

        body.style.overflow = 'hidden';
        html.style.overflow = 'hidden';

        if (deg !== 0) {
            c.style.position  = 'fixed';
            c.style.top       = '50%';
            c.style.left      = '50%';
            c.style.width     = '100vh';
            c.style.height    = '100vw';
            c.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
            body.style.background = '#120e0b';
            document.getElementById('dhikrModeSelect').value = "image";
        } else {
            c.style.position  = 'relative';
            c.style.top       = '0';
            c.style.left      = '0';
            c.style.width     = '100vw';
            c.style.height    = '100vh';
            c.style.transform = 'none';
            body.style.background = '';
            document.getElementById('dhikrModeSelect').value = "cards";
        }
        saveDhikrMode();
    }

    function adjust(t, k, v) {
        userOffsets[t][k] += v;
        localStorage.setItem(OFF_K, JSON.stringify(userOffsets));
        renderAdjusters();
        update();
    }

    function renderAdjusters() {
        const fs   = 'font-size:clamp(10px,1.8vw,13px);';
        const rowS = 'display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);';
        const btnS = 'width:clamp(20px,2.8vw,28px);height:clamp(20px,2.8vw,28px);background:rgba(255,255,255,0.12);border-radius:5px;font-weight:700;cursor:pointer;border:none;color:#fff;' + fs;
        const valS = 'min-width:26px;text-align:center;font-weight:700;' + fs;
        let adH='', iqH='', blH='';
        keys.forEach(k => {
            const row = (t,v) => '<div style="' + rowS + '"><span style="' + fs + 'font-weight:700;">' + arNames[k] + '</span><div style="display:flex;align-items:center;gap:4px;"><button onclick="adjust(\'' + t + '\',\'' + k + '\',-1)" style="' + btnS + '">-</button><span style="' + valS + '">' + v + '</span><button onclick="adjust(\'' + t + '\',\'' + k + '\',1)" style="' + btnS + '">+</button></div></div>';
            adH += row('adhan', userOffsets.adhan[k]);
            iqH += row('iqama', defaultIqama[k] + userOffsets.iqama[k]);
            if (k !== 'Sunrise') blH += row('black', userOffsets.black[k]);
        });
        document.getElementById('adhanAdjList').innerHTML  = adH;
        document.getElementById('iqamaAdjList').innerHTML  = iqH;
        document.getElementById('blackScreenAdjList').innerHTML = blH;
    }

    function format12h(timeStr, offset) {
        offset = offset || 0;
        var parts = timeStr.split(' ')[0].split(':');
        var h = parseInt(parts[0]);
        var m = parseInt(parts[1]);
        var d = new Date();
        d.setHours(h, m + offset, 0);
        var nh = d.getHours() % 12 || 12;
        var p  = d.getHours() >= 12 ? 'م' : 'ص';
        return '<span>' + String(nh).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + '</span><span style="font-size:0.58em;font-weight:900;margin-right:2px;">' + p + '</span>';
    }

    function update() {
        var now = new Date();
        if (!prayerData) return;
        var monthData = prayerData[now.getMonth() + 1];
        if (!monthData) return;
        var today = monthData[now.getDate() - 1];
        if (!today) return;
        var isFriday = now.getDay() === 5;

        document.getElementById('mainClock').innerText     = String(now.getHours() % 12 || 12).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        document.getElementById('secondsClock').innerText  = String(now.getSeconds()).padStart(2,'0');
        document.getElementById('ampm').innerText          = now.getHours() >= 12 ? 'م' : 'ص';
        document.getElementById('dayName').innerText       = now.toLocaleDateString('ar-SA', {weekday:'long'});
        document.getElementById('hijriDate').innerText     = today.date.hijri.day + ' ' + today.date.hijri.month.ar + ' ' + today.date.hijri.year;
        document.getElementById('gregorianDate').innerText = now.toLocaleDateString('ar-SA', {day:'numeric', month:'long', year:'numeric'});

        var nextP = null;
        var listHtml = '';

        for (var ki = 0; ki < keys.length; ki++) {
            var k = keys[ki];
            var parts = today.timings[k].split(' ')[0].split(':');
            var h = parseInt(parts[0]);
            var m = parseInt(parts[1]);
            var adhanT = new Date(now); adhanT.setHours(h, m + userOffsets.adhan[k], 0, 0);
            var iqamaT = new Date(now); iqamaT.setHours(h, m + userOffsets.adhan[k] + defaultIqama[k] + userOffsets.iqama[k], 0, 0);
            var name = (isFriday && k === 'Dhuhr') ? 'الجمعة' : arNames[k];
            if (!nextP && (now < adhanT || (k !== 'Sunrise' && now < iqamaT))) {
                nextP = now < adhanT
                    ? {n:name, t:adhanT, type:'لوقت',        key:k}
                    : {n:name, t:iqamaT, type:'لإقامة صلاة', key:k};
            }
            var isActive = (nextP && k === nextP.key) ? 'next-active' : '';
            var iqamaCol = k === 'Sunrise' ? '--:--' : format12h(today.timings[k], userOffsets.adhan[k] + defaultIqama[k] + userOffsets.iqama[k]);
            listHtml += '<div class="prayer-row ' + isActive + '">'
                      + '<div class="col-name">'  + name + '</div>'
                      + '<div class="col-adhan">' + format12h(today.timings[k], userOffsets.adhan[k]) + '</div>'
                      + '<div class="col-iqama">' + iqamaCol + '</div>'
                      + '</div>';
        }

        if (!nextP) {
            var tom = new Date(now); tom.setDate(now.getDate() + 1);
            var tm  = prayerData[tom.getMonth() + 1];
            var td  = tm ? tm[tom.getDate() - 1] : null;
            if (td) {
                var fp = td.timings.Fajr.split(' ')[0].split(':');
                var nf = new Date(tom); nf.setHours(parseInt(fp[0]), parseInt(fp[1]) + userOffsets.adhan.Fajr, 0, 0);
                nextP = {n:arNames.Fajr, t:nf, type:'لوقت', key:'Fajr'};
            }
        }

        document.getElementById('prayerList').innerHTML = listHtml;

        if (nextP) {
            var diff = nextP.t - now;
            var hh = Math.floor(diff / 3600000);
            var mm = Math.floor((diff % 3600000) / 60000);
            var ss = Math.floor((diff % 60000) / 1000);
            document.getElementById('nextPrayerCountdown').innerHTML =
                'المتبقي ' + nextP.type + ' ' + nextP.n +
                ' <span style="margin-right:8px;font-weight:bold;">' +
                String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0') +
                '</span>';
            handlePromoAnimation(nextP.type === 'لوقت');
        }

        for (var ki2 = 0; ki2 < keys.length; ki2++) {
            var k2 = keys[ki2];
            var parts2 = today.timings[k2].split(' ')[0].split(':');
            var h2 = parseInt(parts2[0]);
            var m2 = parseInt(parts2[1]);
            var adhanT2 = new Date(now); adhanT2.setHours(h2, m2 + userOffsets.adhan[k2], 0, 0);
            var iqamaT2 = new Date(now); iqamaT2.setHours(h2, m2 + userOffsets.adhan[k2] + defaultIqama[k2] + userOffsets.iqama[k2], 0, 0);
            var name2 = (isFriday && k2 === 'Dhuhr') ? 'الجمعة' : arNames[k2];

            if (now >= adhanT2 && now < new Date(adhanT2.getTime() + 30000) && !window.aAct) {
                window.aAct = true;
                document.getElementById('alertTitle').innerText     = 'الآن يرفع أذان';
                document.getElementById('alertPrayerName').innerText = name2;
                document.getElementById('alertOverlay').classList.add('active');
                setTimeout(function() { document.getElementById('alertOverlay').classList.remove('active'); window.aAct = false; }, 30000);
            }

            if (k2 !== 'Sunrise' && now >= iqamaT2 && now < new Date(iqamaT2.getTime() + 10000) && !window.iAct) {
                window.iAct = true;
                document.getElementById('alertTitle').innerText     = 'الآن تقام صلاة';
                document.getElementById('alertPrayerName').innerText = name2;
                document.getElementById('alertOverlay').classList.add('active');
                (function(capturedKey) {
                    setTimeout(function() {
                        document.getElementById('alertOverlay').classList.remove('active');
                        var bDur = userOffsets.black[capturedKey] || 0;
                        if (bDur > 0) {
                            document.getElementById('blackOverlay').classList.add('active');
                            setTimeout(function() {
                                document.getElementById('blackOverlay').classList.remove('active');
                                showPostDhikr(capturedKey);
                                window.iAct = false;
                            }, bDur * 60000);
                        } else {
                            showPostDhikr(capturedKey);
                            window.iAct = false;
                        }
                    }, 10000);
                })(k2);
            }
        }
    }

    function handlePromoAnimation(isAdhanCountdown) {
        var table = document.getElementById('prayerList');
        var promo = document.getElementById('promoImage');
        if (!isAdhanCountdown) {
            table.style.transform = 'translateY(0)';
            promo.style.transform = 'translateY(105%)';
            return;
        }
        var cycle    = 3 * 60 * 1000;
        var show     = 1 * 60 * 1000;
        var progress = Date.now() % cycle;
        if (progress < show) {
            table.style.transform = 'translateY(-110%)';
            promo.style.transform = 'translateY(0)';
        } else {
            table.style.transform = 'translateY(0)';
            promo.style.transform = 'translateY(105%)';
        }
    }

    function showPostDhikr(prayerKey) {
        var mode    = localStorage.getItem(DHIKR_MODE_K) || 'cards';
        var overlay = document.getElementById('afterPrayerOverlay');
        var area    = document.getElementById('dhikrDisplayArea');
        var img     = document.getElementById('dhikrImageDisplay');

        overlay.style.display = 'flex';
        setTimeout(function() { overlay.classList.add('fade-in'); }, 10);

        if (mode === 'image') {
            area.style.display = 'none';
            img.style.display  = 'block';
            setTimeout(function() {
                overlay.classList.remove('fade-in');
                setTimeout(function() { overlay.style.display = 'none'; }, 1000);
            }, 5 * 60000);
        } else {
            img.style.display  = 'none';
            area.style.display = 'flex';
            var list = [
                {t:"أَسْـتَغْفِرُ الله", r:"3 مرات"},
                {t:"اللّهُـمَّ أَنْـتَ السَّلامُ، وَمِـنْكَ السَّلامُ، تَبارَكْتَ يا ذا الجَـلالِ وَالإِكْـرام.", r:"مرة واحدة"},
                {t:"سُـبْحانَ الله", r:"33 مرة"},
                {t:"الحَمْـدُ لله", r:"33 مرة"},
                {t:"اللهُ أكْـبَر", r:"33 مرة"},
                {t:"لا إلهَ إلاّ اللّهُ وحدَهُ لا شريكَ لهُ، لهُ المُـلْكُ ولهُ الحَمْد، وهوَ على كلّ شَيءٍ قَدير.", r:"مرة واحدة"},
                {t:"اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ.", r:"مرة واحدة"}
            ];
            area.innerHTML = '';
            for (var i = 0; i < list.length; i++) {
                var card = document.createElement('div');
                card.className = 'card-dhikr';
                card.id = 'd-card-' + i;
                card.innerHTML = '<p class="ct">' + list[i].t + '</p><p class="cr">' + list[i].r + '</p>';
                area.appendChild(card);
            }
            var idx = 0;
            function run() {
                if (idx > 0) document.getElementById('d-card-' + (idx-1)).classList.remove('active');
                if (idx >= list.length) {
                    overlay.classList.remove('fade-in');
                    setTimeout(function() { overlay.style.display = 'none'; }, 1000);
                    return;
                }
                document.getElementById('d-card-' + idx).classList.add('active');
                idx++;
                setTimeout(run, 50000);
            }
            run();
        }
    }

    function setDhikrText(text) {
        var el  = document.getElementById('dhikrText');
        var len = text.length;
        el.innerText = text;
        if      (len > 80) el.style.fontSize = 'clamp(9px,1.3vw,12px)';
        else if (len > 60) el.style.fontSize = 'clamp(10px,1.6vw,15px)';
        else if (len > 40) el.style.fontSize = 'clamp(11px,1.8vw,17px)';
        else               el.style.fontSize = 'clamp(12px,2vw,20px)';
    }

    setInterval(function() {
        var el = document.getElementById('dhikrText');
        el.classList.add('dhikr-fade');
        setTimeout(function() {
            setDhikrText(dhikrList[Math.floor(Math.random() * dhikrList.length)]);
            el.classList.remove('dhikr-fade');
        }, 600);
    }, 5000);

    init();
</script>
</body>
